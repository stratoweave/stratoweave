name: Trigger rebuild of StratoWeave Guide

# When there are changes to files under docs/ on main branch,
# trigger the workflow to rebuild the StratoWeave Guide
on:
  push:
    branches:
      - main
    paths:
      - 'zensical.toml'
      - 'docs/**'

jobs:
  trigger_web_rebuild:
    runs-on: ubuntu-latest
    env:
      GUIDE_DISPATCH_TOKEN: ${{ secrets.STRATOWEAVE_GUIDE_WORKFLOW_TOKEN }}

    steps:
      - name: "Check guide dispatch token"
        if: env.GUIDE_DISPATCH_TOKEN == ''
        run: |
          echo "Missing secret STRATOWEAVE_GUIDE_WORKFLOW_TOKEN"
          echo "Create a PAT or fine-grained token with access to stratoweave/stratoweave.guide and Actions write permission."
          exit 1

      - name: "Trigger build of stratoweave.guide"
        if: env.GUIDE_DISPATCH_TOKEN != ''
        uses: benc-uk/workflow-dispatch@v1
        with:
          repo: stratoweave/stratoweave.guide
          token: ${{ env.GUIDE_DISPATCH_TOKEN }}
          workflow: main.yml
          ref: main
